name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      # Frontend
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Lint frontend
        run: npm run lint
      
      - name: Type check frontend
        run: npm run typecheck
      
      - name: Build frontend
        run: npm run build
      
      # API
      - name: Install API dependencies
        run: cd api && npm ci
      
      - name: Validate API host.json
        run: |
          if [ ! -f api/host.json ]; then
            echo "Error: api/host.json not found"
            exit 1
          fi
          node -e "const h = require('./api/host.json'); console.log('✓ host.json is valid JSON'); console.log('  Version:', h.version); console.log('  Extension Bundle:', h.extensionBundle?.id);"
      
      - name: Validate API package.json
        run: |
          node -e "const p = require('./api/package.json'); console.log('✓ API package.json is valid'); console.log('  Dependencies:', Object.keys(p.dependencies).join(', '));"
      
      - name: Check for required Azure functions
        run: |
          if [ ! -f api/src/functions/index.js ]; then
            echo "Error: api/src/functions/index.js not found"
            exit 1
          fi
          if ! grep -q "app.http.*games" api/src/functions/index.js; then
            echo "Error: /games function not defined"
            exit 1
          fi
          if ! grep -q "app.http.*players" api/src/functions/index.js; then
            echo "Error: /players function not defined"
            exit 1
          fi
          if ! grep -q "app.http.*events" api/src/functions/index.js; then
            echo "Error: /events function not defined"
            exit 1
          fi
          echo "✓ All required Azure Functions are defined"

  # Future: Add API integration tests once test setup is in place
